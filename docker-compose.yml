services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecom_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/ecom_db?schema=public"
      MONGODB_URI: "mongodb://mongo:27017/ecom_mongo"
      JWT_SECRET: "your_super_secret_jwt_key_here"
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend